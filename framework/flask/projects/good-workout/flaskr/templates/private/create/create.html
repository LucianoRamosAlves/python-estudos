{% extends 'private/base.html' %}

{% block content %}
<section class="posts-create">
    <div class="container">

        <div class="section-header">
            <span class="section-label">NOVO POST</span>
            <h2 class="section-title">Criar publicação</h2>
            <p class="section-desc">Compartilhe algo com a comunidade</p>
        </div>

        <form method="post" class="post-form">

            <div class="form-group">
                <label class="form-label">Título</label>
                <input type="text" name="title" class="form-input" placeholder="Digite o título..." required>
            </div>

            <div class="form-group">
                <label class="form-label">Descrição</label>
                <textarea name="descricao" class="form-textarea" placeholder="Escreva algo..." required></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">URL da imagem</label>
                <input type="text" name="image_url" class="form-input" placeholder="Cole o link da imagem">
            </div>

            <button type="submit" class="btn btn-primary form-submit">
                Publicar
            </button>

        </form>

    </div>
</section>
{% endblock %}
